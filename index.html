<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginBox" class="card">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="mainContent" style="display:none;">
        
        <div class="card">
            <h3 id="formTitle">+ Add Student</h3>
            <input type="hidden" id="editIdx">
            <input type="text" id="studentName" placeholder="Student Name">
            <input type="text" id="parentPhone" placeholder="947XXXXXXXX">

            <select id="studentGrade">
                <option value="Grade 6">Grade 6</option>
                <option value="Grade 7">Grade 7</option>
                <option value="Grade 8">Grade 8</option>
                <option value="Grade 9">Grade 9</option>
                <option value="Grade 10">Grade 10</option>
                <option value="Grade 11">Grade 11</option>
                <option value="Other">Other</option>
            </select>
            
            <select id="group">
                <option value="Grade 8 Tuesday 3:00-5:00">Grade 8 Tuesday 3:00-5:00</option>
                <option value="Grade 7 Saturday 11:00-1:00">Grade 7 Saturday 11:00-1:00</option>
                <option value="Grade 11 Saturday 6:00-8:00">Grade 11 Saturday 6:00-8:00</option>
                <option value="Grade 8 Monday 3:00-5:00">Grade 8 Monday 3:00-5:00</option>
                <option value="Grade 9 Maths Sunday 8:30-10:30">Grade 9 Maths Sunday 8:30-10:30</option>
                <option value="Grade 10 Thursday 3:00-5:00">Grade 10 Thursday 3:00-5:00</option>
                <option value="Grade 6 New">Grade 6 New</option>
                <option value="Individual Class">Individual Class</option>
            </select>
            <input type="number" id="monthlyFee" placeholder="Monthly Fee (Rs.)">
            <button id="saveBtn" onclick="addOrUpdateStudent()">Save Student</button>
        </div>

        <div class="card">
            <input type="text" id="searchBar" placeholder="🔍 Search Name..." onkeyup="renderStudents()">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <select id="monthSelect" onchange="renderStudents()">
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March" selected>March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
                <select id="gradeFilter" onchange="renderStudents()">
                    <option value="All">All Grades (ඔක්කොම)</option>
                    <option value="Grade 6">Grade 6</option>
                    <option value="Grade 7">Grade 7</option>
                    <option value="Grade 8">Grade 8</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option>
                </select>
            </div>
        </div>

        <div class="card" id="pendingSection" style="border: 2px solid #e74c3c;">
            <h3 style="color: #e74c3c;">⚠️ Pending Payments (ගාස්තු ගෙවීමට ඇති අය)</h3>
            <div id="pendingDisplay"></div>
        </div>

        <div id="studentList"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
