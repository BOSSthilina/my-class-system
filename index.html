<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Class Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="loginBox">
        <div class="login-card">
            <h2>Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="login()">Login</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="header">
            <h2>Class Manager Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="form-section">
            <h3>+ Add New Student</h3>
            <div class="input-grid">
                <input type="text" id="studentName" placeholder="Student Name">
                <input type="text" id="parentPhone" placeholder="Phone (947XXXXXXXX)">
                
                <select id="classType">
                    <option value="Group">Group Class</option>
                    <option value="Individual">Individual Class</option>
                </select>

                <select id="group">
                    <option value="Grade 6">Grade 6</option>
                    <option value="Grade 7">Grade 7</option>
                    <option value="Grade 8">Grade 8</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option>
                    <option value="Revision">Revision</option>
                </select>

                <input type="number" id="monthlyFee" placeholder="Monthly Fee (Rs.)">
                <button class="add-btn" onclick="addStudent()">Add Student</button>
            </div>
        </div>

        <div class="controls-section">
            <input type="text" id="searchBar" placeholder="🔍 Search student name..." onkeyup="renderStudents()">
            
            <div class="filter-group">
                <select id="monthSelect" onchange="renderStudents()">
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March" selected>March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>

                <select id="filterGrade" onchange="renderStudents()">
                    <option value="All">All Grades (සියලුම ශ්‍රේණි)</option>
                    <option value="Grade 6">Grade 6</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option>
                </select>

                <select id="filterType" onchange="renderStudents()">
                    <option value="All">All Types (Group & Ind.)</option>
                    <option value="Group">Group Only</option>
                    <option value="Individual">Individual Only</option>
                </select>
            </div>
        </div>

        <div id="studentList" class="student-grid"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
